    function App() {

      const [questionIndex, setQuestionIndex] = useState(0);
      const [answers, setAnswers] = useState({});

      const [adminPassword, setAdminPassword] = useState('');
      const [adminError, setAdminError] = useState('');

      // 紀錄資料與狀態
      const [records, setRecords] = useState([]);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isLoadingAdmin, setIsLoadingAdmin] = useState(false);

      useEffect(() => {
        // 進入教師後台時，優先從 GAS 獲取資料
        if (view === 'admin') {
          if (GAS_URL && GAS_URL !== '') {
            setIsLoadingAdmin(true);
            fetch(GAS_URL)
              .then(res => res.json())
              .then(data => {
                setRecords(data);
                setIsLoadingAdmin(false);
              })
              .catch(err => {
                console.error('GAS 讀取失敗，改為讀取本機紀錄:', err);
                const storedRecords = JSON.parse(localStorage.getItem('jlpt_test_records') || '[]');
                setRecords(storedRecords);
                setIsLoadingAdmin(false);
              });
          } else {
            const storedRecords = JSON.parse(localStorage.getItem('jlpt_test_records') || '[]');
            setRecords(storedRecords);
          }
        }
      }, [view]);

      const handleOptionSelect = (questionId, optionIndex) => {
        setAnswers({
          ...answers,
          [questionId]: optionIndex
        });
        setShowWarning(false);
      };

      const handleStart = () => {
        if (!studentId.trim() || !studentName.trim()) {
          setFormError('請輸入學號與姓名以開始測驗');
          return;
        }
        setFormError('');
        setAnswers({}); 
        setSectionIndex(0);
        setQuestionIndex(0);
        setView('intro');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const saveToLocalStorage = (record) => {
        const existingRecords = JSON.parse(localStorage.getItem('jlpt_test_records') || '[]');
        localStorage.setItem('jlpt_test_records', JSON.stringify([...existingRecords, record]));
      };

      const submitTest = async () => {
        let correctCount = 0;
        let totalQuestions = 0;
        const detailedAnswers = []; 

        // 計算分數與紀錄作答明細
        testData.forEach(section => {
          section.questions.forEach(q => {
            totalQuestions++;
            const userAns = answers[q.id];
            const isCorrect = userAns === q.correctAnswer;
            
            if (isCorrect) correctCount++;

            const displayAns = userAns !== undefined ? (userAns + 1) : '未答';
            const status = isCorrect ? 'T' : 'F';
            
            detailedAnswers.push(`${displayAns}(${status})`);
          });
        });

        const score = Math.round((correctCount / totalQuestions) * 100);

        const newRecord = {
          id: Date.now().toString(),
          studentId: studentId.trim(),
          studentName: studentName.trim(),
          score,
          correctCount,
          totalQuestions,
          detailedAnswers,
          timestamp: new Date().toISOString()
        };

        setIsSubmitting(true);

        if (GAS_URL && GAS_URL !== '') {
          try {
            const response = await fetch(GAS_URL, {
              method: 'POST',
              body: JSON.stringify(newRecord)
            });
            
            const result = await response.json();
            if (result.status === 'success') {
              saveToLocalStorage(newRecord); 
            } else {
              throw new Error('GAS 回傳失敗');
            }
          } catch (error) {
            console.error('上傳至 GAS 失敗，已轉存至本機:', error);
            saveToLocalStorage(newRecord);
          }
        } else {
          saveToLocalStorage(newRecord);
        }

        setIsSubmitting(false);
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setView('end');
      };

      const handleNext = () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        if (view === 'intro') {
          setView('question');
          setQuestionIndex(0);
          setShowWarning(false);
        } else if (view === 'question') {
          const currentSection = testData[sectionIndex];
          const currentQuestion = currentSection.questions[questionIndex];

          if (answers[currentQuestion.id] === undefined && !showWarning) {
            setShowWarning(true);
            return;
          }

          setShowWarning(false);

          if (questionIndex < currentSection.questions.length - 1) {
            setQuestionIndex((prev) => prev + 1);
          } else {
            if (sectionIndex < testData.length - 1) {
              setView('intro');
              setSectionIndex((prev) => prev + 1);
            } else {
              submitTest();
            }
          }
        }
      };

      const exportCSV = () => {
        const questionHeaders = [];
        testData.forEach(sec => sec.questions.forEach(q => questionHeaders.push(q.id)));

        const headers = ['測驗時間', '學號', '姓名', '分數', '答對題數', '總題數', ...questionHeaders];
        const rows = records.map(r => [
          new Date(r.timestamp).toLocaleString(),
          `="${r.studentId}"`, 
          r.studentName,
          r.score,
          r.correctCount,
          r.totalQuestions,
          ...(r.detailedAnswers || Array(r.totalQuestions).fill(''))
        ]);
        
        const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "測驗成績與詳細解答.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

        return (
          <div className="min-h-[100dvh] flex items-center justify-center p-4 sm:p-6">
            <div className="max-w-sm w-full bg-white rounded-2xl shadow-lg sm:shadow-xl p-8 text-center transition-all">

                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
              </div>
              <h2 className="text-2xl font-bold text-gray-800 mb-6">教師後台登入</h2>
              
              <div className="space-y-4 mb-8 text-left">
                <div>
                  <input 
                    type="password" 
                    value={adminPassword}
                    onChange={(e) => {
                      setAdminPassword(e.target.value);
                      setAdminError('');
                    }}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') handleAdminLogin();
                    }}
                    className={`w-full px-4 py-3 rounded-xl border focus:outline-none transition-all ${adminError ? 'border-red-500 focus:ring-2 focus:ring-red-200' : 'border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500'}`}
                    placeholder="請輸入後台密碼"
                    autoFocus
                  />
                </div>
                {adminError && (
                  <div className="text-red-500 text-sm font-medium text-center">{adminError}</div>
                )}
              </div>

              <div className="flex gap-3">
                <button 
                  onClick={() => setView('start')}
                  className="flex-1 px-4 py-3 border-2 border-gray-300 text-gray-700 rounded-xl font-medium hover:bg-gray-50 active:scale-95 transition-all"
                >
                  取消
                </button>
                <button 
                  onClick={handleAdminLogin}
                  className="flex-1 px-4 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 shadow-md hover:shadow-lg active:scale-95 transition-all"
                >
                  登入
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (view === 'admin') {
        return (
          <div className="min-h-[100dvh] p-4 sm:p-6 lg:p-8">
            <div className="max-w-5xl mx-auto">
              <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 sm:p-8">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                  <div>
                    <h2 className="text-2xl font-bold text-gray-800">測驗成績管理</h2>
                    {isLoadingAdmin && <span className="text-sm text-blue-500 font-medium">正在從伺服器同步資料...</span>}
                  </div>
                  <div className="flex gap-3 w-full sm:w-auto">
                    <button 
                      onClick={() => setView('start')}
                      className="flex-1 sm:flex-none px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors"
                    >
                      回首頁
                    </button>
                    <button 
                      onClick={exportCSV}
                      disabled={records.length === 0}
                      className="flex-1 sm:flex-none px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      匯出 CSV
                    </button>
                  </div>
                </div>

                <div className="overflow-x-auto rounded-xl border border-gray-200">
                  <table className="min-w-full divide-y divide-gray-200">
                    <thead className="bg-gray-50">
                      <tr>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">測驗時間</th>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">學號</th>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">姓名</th>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">分數</th>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">答對/總題數</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-gray-200">
                      {records.length === 0 && !isLoadingAdmin ? (
                        <tr>
                          <td colSpan="5" className="px-6 py-8 text-center text-gray-500">目前尚無作答紀錄</td>
                        </tr>
                      ) : (
                        records.map((record) => (
                          <tr key={record.id} className="hover:bg-gray-50">
                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                              {new Date(record.timestamp).toLocaleString()}
                            </td>
                            <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{record.studentId}</td>
                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{record.studentName}</td>
                            <td className="px-6 py-4 whitespace-nowrap">
                              <span className={`px-3 py-1 inline-flex text-sm leading-5 font-semibold rounded-full ${record.score >= 60 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                {record.score} 分
                              </span>
                            </td>
                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                              {record.correctCount} / {record.totalQuestions}
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
                <div className="mt-4 text-sm text-gray-500 text-right">
                  ※ 詳細的每一題作答狀況（T/F）請點擊「匯出 CSV」或至雲端試算表查看。
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (view === 'end') {
        return (
          <div className="min-h-[100dvh] flex flex-col items-center justify-center p-4 sm:p-6">
            <div className="max-w-xl w-full bg-white rounded-2xl shadow-lg sm:shadow-xl p-8 sm:p-12 text-center transition-all">
              <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-8">
                <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7"></path>
                </svg>
              </div>
              <h1 className="text-3xl font-bold text-gray-800 mb-4">測驗已完成</h1>
              <p className="text-gray-600 mb-10 text-lg">
                您的作答紀錄已成功送出。感謝您的參與！
              </p>
              <button 
                onClick={() => setView('start')}
                className="w-full sm:w-auto px-10 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 active:scale-95 transition-all"
              >
                回首頁
              </button>
            </div>
          </div>
        );
      }

      const currentSection = testData[sectionIndex];

      if (view === 'intro') {
        return (
          <div className="min-h-[100dvh] flex flex-col items-center justify-center p-4 sm:p-6">
            <div className="max-w-2xl w-full bg-white rounded-2xl shadow-lg sm:shadow-xl p-8 sm:p-14 text-center border-t-8 border-blue-600 transition-all">
              <h2 className="text-3xl sm:text-4xl font-bold text-gray-800 mb-4">{currentSection.title}</h2>
              {currentSection.description && (
                <p className="text-lg sm:text-xl text-gray-600 mb-10 sm:mb-12">{currentSection.description}</p>
              )}
              <div className="flex justify-center items-center">
                <button 
                  onClick={handleNext}
                  className="w-full sm:w-auto px-10 py-4 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 shadow-md hover:shadow-lg active:scale-95 transition-all text-lg sm:text-base"
                >
                  進入本大題
                </button>
              </div>
            </div>
          </div>
        );
      }

      const currentQuestion = currentSection.questions[questionIndex];
      const isLastQuestionOverall = sectionIndex === testData.length - 1 && questionIndex === currentSection.questions.length - 1;
      const progressPercentage = ((questionIndex + 1) / currentSection.questions.length) * 100;

      return (
        <div className={`min-h-[100dvh] pb-24 pt-6 sm:pt-10 px-4 sm:px-6 lg:px-8 flex flex-col items-center transition-colors duration-500 ${showWarning ? 'bg-red-50' : ''}`}>
          <div className="w-full max-w-3xl">
            
            {showWarning && (
              <div className="mb-4 sm:mb-6 p-4 bg-red-100 border-l-4 border-red-500 text-red-700 rounded-xl shadow-sm animate-pulse">
                <div className="flex items-center">
                  <svg className="w-6 h-6 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                  </svg>
                  <span className="font-medium text-sm sm:text-base">您尚未作答本題！若確定要留白跳過，請再次點擊「{isLastQuestionOverall ? '提交測驗' : '下一頁'}」。</span>
                </div>
              </div>
            )}

            <div className="mb-6 sm:mb-8">
              <div className="flex justify-between items-center text-xs sm:text-sm font-medium text-gray-500 mb-2 px-1">
                <span>{currentSection.title}</span>
                <span>{questionIndex + 1} / {currentSection.questions.length}</span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                <div 
                  className="bg-blue-600 h-2.5 rounded-full transition-all duration-500 ease-out" 
                  style={{ width: `${progressPercentage}%` }}
                ></div>
              </div>
            </div>

            <div className={`bg-white rounded-2xl shadow-sm border p-5 sm:p-8 md:p-10 mb-8 transition-all duration-300 ${showWarning ? 'border-red-300 ring-4 ring-red-100' : 'border-gray-100'}`}>
              
              {currentQuestion.context && (
                <div className="mb-8 p-5 sm:p-8 bg-gray-50 border border-gray-200 rounded-xl text-gray-800">
                  {currentQuestion.context}
                </div>
              )}

              <div className="mb-8 sm:mb-10">
                <span className="text-lg sm:text-xl text-gray-800 font-medium whitespace-pre-wrap leading-relaxed block">
                  {currentQuestion.text}
                </span>
              </div>

              <div className="space-y-3 sm:space-y-4">
                {currentQuestion.options.map((opt, optIdx) => {
                  const isSelected = answers[currentQuestion.id] === optIdx;
                  return (
                    <label 
                      key={optIdx} 
                      className={`flex items-start p-4 sm:p-5 border-2 rounded-xl cursor-pointer transition-all duration-200 
                        ${isSelected ? 'border-blue-600 bg-blue-50/50' : 'border-gray-200 hover:border-blue-300 hover:bg-gray-50'}`}
                      onClick={() => handleOptionSelect(currentQuestion.id, optIdx)}
                    >
                      <div className={`mt-0.5 w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center mr-4 transition-colors
                        ${isSelected ? 'border-blue-600 bg-blue-600' : 'border-gray-300'}`}>
                        {isSelected && <div className="w-2.5 h-2.5 rounded-full bg-white"></div>}
                      </div>
                      <span className={`text-base sm:text-lg pt-0.5 leading-snug ${isSelected ? 'text-blue-900 font-medium' : 'text-gray-700'}`}>
                        {opt}
                      </span>
                    </label>
                  );
                })}
              </div>

            </div>

            <div className="flex justify-end items-stretch sm:items-center mt-6">
              <button 
                disabled={isSubmitting}
                onClick={handleNext}
                className={`w-full sm:w-auto px-10 py-4 sm:py-3 text-white rounded-xl font-medium shadow-md hover:shadow-lg active:scale-95 transition-all text-lg sm:text-base text-center disabled:opacity-70 disabled:cursor-wait
                  ${showWarning ? 'bg-red-600 hover:bg-red-700' : (isLastQuestionOverall ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700')}`}
              >
                {isSubmitting ? '資料傳送中...' : (isLastQuestionOverall ? '提交測驗' : '下一頁')}
              </button>
            </div>

          </div>
        </div>
      );
    }

    // 將 React App 渲染到畫面上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
